<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - NA Ride Edu</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000a14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        h1 { color: #06b6d4; }
        p { color: #94a3b8; }
        button { 
            background-color: #06b6d4; 
            color: #000a14; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
        }
        button:hover {
            background-color: #0891b2;
        }
    </style>
</head>
<body>
    <h1>You are offline</h1>
    <p>Please check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
</body>
</html>
